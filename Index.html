<!DOCTYPE html>
<html lang="ar" dir="rtl"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>انعكاس المستقبل | لوحة التحكم الذكية</title><script src="https://cdn.tailwindcss.com"></script><script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/3.9.1/chart.min.js"></script><link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;700;900&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet"><style>:root {--neon-pink: #ff007f;--neon-purple: #9d00ff;--dark-bg: #020205;}body {font-family: 'Cairo', sans-serif;background-color: var(--dark-bg);color: white;overflow-x: hidden;margin: 0;}.orbitron { font-family: 'Orbitron', sans-serif; }.glass {background: rgba(255, 255, 255, 0.03);backdrop-filter: blur(20px);border: 1px solid rgba(255, 255, 255, 0.1);}.chart-container {position: relative;width: 100%;max-width: 600px;margin-left: auto;margin-right: auto;height: 300px;max-height: 400px;}.no-scrollbar::-webkit-scrollbar { display: none; }.active-tab {background: rgba(255, 0, 127, 0.2);color: var(--neon-pink);border: 1px solid rgba(255, 0, 127, 0.3);}@keyframes scan {0% { transform: translateY(-100%); }100% { transform: translateY(100%); }}.scanner-line {width: 100%;height: 2px;background: var(--neon-pink);box-shadow: 0 0 15px var(--neon-pink);position: absolute;animation: scan 2s linear infinite;}</style></head><body>
<!-- Chosen Palette: Midnight Cyber (Deep dark background with neon pink and purple accents) -->
<!-- Application Structure Plan:1. Splash Screen (Mirror Stage): Digital clock focus, interactive "tap to start".2. Identification Stage: User input with CSS animations to simulate biometric scanning.3. Main Dashboard:- Top Bar: Real-time time and system status.- Sidebar: Iconic navigation for different home sectors (Kitchen, Bedroom, Farm, etc.).- Content Area: Dynamic cards and charts that update based on JS state.- Footer: Quick stats for house metrics.Rationale: This flow builds an immersive narrative of "activating" a smart mirror system, moving from standby to personal data visualization.-->
<!-- Visualization & Content Choices:- Energy Consumption -> Goal: Compare -> Bar Chart (Chart.js) -> Showing peak usage times.- Temperature Distribution -> Goal: Inform -> Doughnut Chart (Chart.js) -> Showing thermal balance across rooms.- Camera Feed -> Goal: Security -> Simulated UI with scanning line (HTML/CSS) -> Enhancing "Future" aesthetic.- Contextual Sliders -> Goal: Control -> Range inputs for lighting/heat.-->
<!-- CONFIRMATION: NO SVG graphics used. NO Mermaid JS used. -->
<div id="app"><!-- Stage 1: Mirror Standby --><section id="stage-mirror" class="h-screen flex flex-col items-center justify-center cursor-pointer transition-opacity duration-1000"><div class="text-center space-y-4"><h1 id="main-clock" class="orbitron text-8xl md:text-9xl font-black tracking-tighter opacity-80 bg-clip-text text-transparent bg-gradient-to-b from-white to-white/20">00:00</h1><p class="text-pink-500 tracking-[1.5em] text-xs font-bold uppercase mr-[-1.5em]">System Standby</p><div class="mt-20 p-6 border border-white/10 rounded-full animate-bounce inline-block"><span class="block w-8 h-8 rounded-full bg-pink-500/20 flex items-center justify-center"><span class="w-2 h-2 bg-pink-500 rounded-full"></span></span></div></div></section>
<!-- Stage 2: Identification -->
<section id="stage-identify" class="hidden h-screen flex items-center justify-center p-6 animate-in fade-in">
    <div class="w-full max-w-md p-10 glass rounded-[3rem] shadow-2xl relative overflow-hidden">
        <div id="scanner" class="absolute inset-0 opacity-20 pointer-events-none">
            <div class="scanner-line"></div>
        </div>
        <div class="text-center space-y-8 relative z-10">
            <div class="w-24 h-24 mx-auto bg-gradient-to-tr from-pink-500 to-purple-500 rounded-3xl flex items-center justify-center shadow-lg shadow-pink-500/20">
                <span class="text-4xl">👤</span>
            </div>
            <h2 class="text-3xl font-black">التعرف على الهوية</h2>
            <div id="login-form" class="space-y-4">
                <input type="text" id="user-input" placeholder="اكتب اسمك هنا..." class="w-full bg-white/5 border border-white/10 rounded-2xl py-5 px-6 text-center text-xl outline-none focus:border-pink-500 transition-all text-white">
                <button onclick="handleLogin()" class="w-full py-5 bg-white text-black font-black rounded-2xl hover:scale-[1.02] active:scale-95 transition-all">بدء التشغيل</button>
            </div>
            <div id="login-success" class="hidden py-6 space-y-4">
                <div class="text-green-400 text-5xl">✓</div>
                <p id="welcome-msg" class="text-xl font-bold"></p>
            </div>
        </div>
    </div>
</section>

<!-- Stage 3: Dashboard -->
<section id="stage-dashboard" class="hidden h-screen flex flex-col p-4 md:p-6 gap-6 animate-in zoom-in-95">
    <!-- Top Bar -->
    <header class="flex items-center justify-between glass p-6 rounded-[2.5rem]">
        <div class="flex items-center gap-4">
            <div class="w-12 h-12 bg-pink-500 rounded-2xl flex items-center justify-center shadow-lg shadow-pink-500/40">
                <span class="text-2xl">⚡</span>
            </div>
            <div class="hidden sm:block">
                <h3 id="display-name" class="font-black text-lg leading-tight">بيت المها الذكي</h3>
                <p class="text-[10px] text-white/40 uppercase tracking-widest">Active Security Protocol Alpha</p>
            </div>
        </div>
        <div class="text-center md:text-right orbitron">
            <div id="dash-clock" class="text-2xl md:text-3xl font-black text-white/90">00:00:00</div>
            <div class="text-[10px] text-pink-500 font-bold uppercase tracking-widest">Real-time Sync</div>
        </div>
    </header>

    <div class="flex-1 flex flex-col md:flex-row gap-6 overflow-hidden">
        <!-- Navigation -->
        <aside class="flex md:flex-col overflow-x-auto md:overflow-y-auto no-scrollbar glass rounded-[2.5rem] md:w-24 p-4 gap-4 items-center">
            <button onclick="switchTab('home')" class="nav-btn active-tab w-14 h-14 shrink-0 rounded-2xl flex items-center justify-center transition-all" data-id="home">🏠</button>
            <button onclick="switchTab('kitchen')" class="nav-btn w-14 h-14 shrink-0 rounded-2xl flex items-center justify-center transition-all" data-id="kitchen">🍴</button>
            <button onclick="switchTab('bedroom')" class="nav-btn w-14 h-14 shrink-0 rounded-2xl flex items-center justify-center transition-all" data-id="bedroom">🛏️</button>
            <button onclick="switchTab('farm')" class="nav-btn w-14 h-14 shrink-0 rounded-2xl flex items-center justify-center transition-all" data-id="farm">🌿</button>
            <button onclick="switchTab('energy')" class="nav-btn w-14 h-14 shrink-0 rounded-2xl flex items-center justify-center transition-all" data-id="energy">📊</button>
            <button onclick="switchTab('security')" class="nav-btn w-14 h-14 shrink-0 rounded-2xl flex items-center justify-center transition-all" data-id="security">🛡️</button>
        </aside>

        <!-- Main Content Area -->
        <main id="main-content" class="flex-1 overflow-y-auto no-scrollbar space-y-6 pb-10">
            <!-- Content will be injected here via JS -->
        </main>
    </div>

    <!-- Quick Stats Footer -->
    <footer class="grid grid-cols-2 md:grid-cols-4 gap-4">
        <div class="glass p-4 rounded-3xl flex items-center gap-4">
            <div class="p-2 rounded-xl bg-yellow-500/10 text-yellow-500">⚡</div>
            <div>
                <div class="text-[10px] text-white/30 uppercase font-bold">الطاقة</div>
                <div class="text-sm font-black">2.4 Kw/h</div>
            </div>
        </div>
        <div class="glass p-4 rounded-3xl flex items-center gap-4">
            <div class="p-2 rounded-xl bg-blue-500/10 text-blue-500">💧</div>
            <div>
                <div class="text-[10px] text-white/30 uppercase font-bold">المياه</div>
                <div class="text-sm font-black">450 L</div>
            </div>
        </div>
        <div class="glass p-4 rounded-3xl flex items-center gap-4">
            <div class="p-2 rounded-xl bg-orange-500/10 text-orange-500">🌡️</div>
            <div>
                <div class="text-[10px] text-white/30 uppercase font-bold">الحرارة</div>
                <div class="text-sm font-black">24°C</div>
            </div>
        </div>
        <div class="glass p-4 rounded-3xl flex items-center gap-4">
            <div class="p-2 rounded-xl bg-green-500/10 text-green-500">🍃</div>
            <div>
                <div class="text-[10px] text-white/30 uppercase font-bold">جودة الهواء</div>
                <div class="text-sm font-black">98%</div>
            </div>
        </div>
    </footer>
</section>






































</div>
<script>// App Statelet currentUser = "";let energyChart = null;// Initializationfunction updateClocks() {const now = new Date();const timeStr = now.toLocaleTimeString('en-US', { hour12: false, hour: '2-digit', minute: '2-digit' });const fullTimeStr = now.toLocaleTimeString('en-US', { hour12: false });document.getElementById('main-clock').textContent = timeStr;document.getElementById('dash-clock').textContent = fullTimeStr;}setInterval(updateClocks, 1000);updateClocks();// Sound effects (Web Audio API)function playSound(freq) {const ctx = new (window.AudioContext || window.webkitAudioContext)();const osc = ctx.createOscillator();const gain = ctx.createGain();osc.connect(gain);gain.connect(ctx.destination);osc.frequency.setValueAtTime(freq, ctx.currentTime);gain.gain.setValueAtTime(0.1, ctx.currentTime);gain.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + 0.2);osc.start();osc.stop(ctx.currentTime + 0.2);}// Stage Transitionsdocument.getElementById('stage-mirror').onclick = () => {playSound(440);document.getElementById('stage-mirror').classList.add('opacity-0');setTimeout(() => {document.getElementById('stage-mirror').style.display = 'none';document.getElementById('stage-identify').style.display = 'flex';}, 1000);};function handleLogin() {const input = document.getElementById('user-input').value;if (!input.trim()) return;currentUser = input;playSound(880);document.getElementById('login-form').classList.add('hidden');document.getElementById('login-success').classList.remove('hidden');document.getElementById('welcome-msg').textContent = `أهلاً بك يا ${currentUser}`;document.getElementById('display-name').textContent = `بيت ${currentUser} الذكي`;setTimeout(() => {document.getElementById('stage-identify').classList.add('hidden');document.getElementById('stage-dashboard').style.display = 'flex';switchTab('home');}, 2000);}// UI Content Generatorconst sections = {home: {title: "نظرة عامة",content: `<div class="grid grid-cols-1 md:grid-cols-2 gap-6"><div class="glass p-8 rounded-[3rem] text-center"><h4 class="text-xl font-bold mb-4">أهلاً بك مرة أخرى</h4><p class="text-white/60 mb-6">كل الأنظمة تعمل بكفاءة عالية اليوم.</p><div class="flex justify-center gap-4"><div class="w-16 h-16 rounded-2xl bg-pink-500/20 flex items-center justify-center text-2xl">🏠</div><div class="w-16 h-16 rounded-2xl bg-purple-500/20 flex items-center justify-center text-2xl">✨</div></div></div><div class="glass p-8 rounded-[3rem]"><h4 class="text-xl font-bold mb-4">حالة الحماية</h4><div class="flex items-center gap-4 p-4 bg-green-500/10 rounded-2xl border border-green-500/20"><span class="text-green-400">🛡️ النظام مؤمن</span></div></div></div>`},kitchen: {title: "المطبخ",content: `<div class="grid grid-cols-1 md:grid-cols-2 gap-6"><div class="glass p-8 rounded-[3rem] text-center"><div class="orbitron text-5xl font-black text-orange-400 mb-2">180°C</div><p class="text-sm text-white/40 mb-6">حرارة الفرن الحالية</p><div class="flex gap-4"><button class="flex-1 py-4 bg-orange-500/20 rounded-2xl border border-orange-500/30 font-bold" onclick="playSound(600)">رفع</button><button class="flex-1 py-4 bg-orange-500/20 rounded-2xl border border-orange-500/30 font-bold" onclick="playSound(300)">خفض</button></div></div><div class="glass p-8 rounded-[3rem]"><h4 class="text-lg font-bold mb-4">تنبيهات الثلاجة</h4><ul class="space-y-3"><li class="flex justify-between items-center bg-red-500/10 p-3 rounded-xl border border-red-500/20 text-xs"><span>الحليب انتهى</span><span class="bg-red-500 px-2 py-0.5 rounded">هام</span></li><li class="flex justify-between items-center bg-white/5 p-3 rounded-xl text-xs"><span>البيض متبقي 2</span><span>تذكير</span></li></ul></div></div>`},bedroom: {title: "غرفة النوم",content: `<div class="grid grid-cols-1 md:grid-cols-2 gap-6"><div class="glass p-8 rounded-[3rem]"><h4 class="font-bold mb-4">الإضاءة</h4><input type="range" class="w-full accent-purple-500 mb-4 h-2 bg-white/10 rounded-lg appearance-none"><div class="flex justify-between text-[10px] text-white/30 uppercase tracking-widest"><span>خافت</span><span>ساطع</span></div></div><div class="glass p-8 rounded-[3rem]"><h4 class="font-bold mb-4">أصوات النوم</h4><div class="grid grid-cols-2 gap-2"><button class="p-3 bg-white/5 rounded-xl text-xs hover:bg-white/10" onclick="playSound(150)">مطر</button><button class="p-3 bg-white/5 rounded-xl text-xs hover:bg-white/10" onclick="playSound(100)">بحر</button></div></div></div>`},farm: {title: "المزرعة الذكية",content: `<div class="glass p-8 rounded-[3rem]"><h4 class="font-bold mb-6">تحليل التربة</h4><div class="space-y-6"><div><div class="flex justify-between mb-2 text-xs"><span>الرطوبة</span><span class="text-green-400">65%</span></div><div class="w-full h-1.5 bg-white/5 rounded-full overflow-hidden"><div class="h-full bg-green-500 w-[65%]"></div></div></div><div class="p-4 bg-blue-500/10 border border-blue-500/20 rounded-2xl flex items-center justify-between"><span class="text-sm font-bold">الري الذكي مفعل</span><span class="animate-pulse text-blue-400">💧</span></div></div></div>`},energy: {title: "استهلاك الطاقة",content: `<div class="glass p-8 rounded-[3rem]"><h4 class="font-bold mb-6">الاستهلاك الأسبوعي (Kw)</h4><div class="chart-container"><canvas id="energyCanvas"></canvas></div></div>`},security: {title: "الأمان",content: `<div class="glass p-8 rounded-[3rem] relative overflow-hidden"><div class="aspect-video bg-black rounded-3xl mb-6 flex items-center justify-center text-white/10 relative"><span class="text-4xl animate-pulse">👁️</span><div class="absolute top-4 left-4 bg-red-600 px-2 py-1 rounded text-[10px] font-bold">LIVE</div><div class="absolute bottom-4 right-4 text-[10px] font-mono opacity-50">GATE_CAM_01</div></div><button class="w-full py-5 bg-red-500 text-white font-black rounded-3xl shadow-lg shadow-red-500/20 hover:scale-[1.01] active:scale-95 transition-all">إغلاق جميع المداخل</button></div>`}};function switchTab(tabId) {playSound(400);// Update Buttonsdocument.querySelectorAll('.nav-btn').forEach(btn => {btn.classList.remove('active-tab');if(btn.dataset.id === tabId) btn.classList.add('active-tab');});// Update Contentconst section = sections[tabId];const container = document.getElementById('main-content');container.innerHTML = `<div class="animate-in slide-in-from-bottom-5 duration-500"><h2 class="text-3xl font-black mb-8 px-2">${section.title}</h2>${section.content}</div>`;// Initialize Charts if neededif (tabId === 'energy') {setTimeout(initEnergyChart, 100);}}function initEnergyChart() {const ctx = document.getElementById('energyCanvas').getContext('2d');if (energyChart) energyChart.destroy();energyChart = new Chart(ctx, {type: 'bar',data: {labels: ['الأحد', 'الاثنين', 'الثلاثاء', 'الأربعاء', 'الخميس', 'الجمعة', 'السبت'],datasets: [{label: 'الاستهلاك',data: [12, 19, 15, 8, 22, 30, 25],backgroundColor: 'rgba(255, 0, 127, 0.5)',borderColor: '#ff007f',borderWidth: 2,borderRadius: 10}]},options: {responsive: true,maintainAspectRatio: false,plugins: {legend: { display: false }},scales: {y: {beginAtZero: true,grid: { color: 'rgba(255,255,255,0.05)' },ticks: { color: 'rgba(255,255,255,0.3)' }},x: {grid: { display: false },ticks: { color: 'rgba(255,255,255,0.3)' }}}}});}</script>
</body></html>

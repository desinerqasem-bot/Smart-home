<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>انعكاس المستقبل | النسخة الاحترافية</title>
    <!-- تضمين المكتبات اللازمة للعمل مباشرة -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;700;900&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Cairo', sans-serif; background-color: #020205; color: white; margin: 0; overflow: hidden; }
        .orbitron { font-family: 'Orbitron', sans-serif; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        @keyframes scan { 0% { transform: translateY(-100%); } 100% { transform: translateY(100%); } }
        .scanner-line { width: 100%; height: 2px; background: #ff007f; box-shadow: 0 0 15px #ff007f; position: absolute; animation: scan 2s linear infinite; }
        input[type=range] { -webkit-appearance: none; background: rgba(255,255,255,0.1); border-radius: 10px; height: 6px; }
        input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; height: 18px; width: 18px; border-radius: 50%; background: white; cursor: pointer; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useCallback } = React;

        // الأيقونات المحاكية (لأن Lucide تحتاج إعداد خاص، سنستخدم الرموز التعبيرية الأنيقة)
        const Icons = {
            Clock: "🕒", Home: "🏠", Kitchen: "🍴", Bed: "🛏️", Farm: "🌿", 
            Garage: "🚗", Living: "🛋️", Bath: "🚿", Door: "🚪", Temp: "🌡️", 
            Water: "💧", Power: "⚡", User: "👤", Shield: "🛡️", Eye: "👁️"
        };

        const App = () => {
            const [stage, setStage] = useState('mirror'); 
            const [userName, setUserName] = useState('');
            const [currentSection, setCurrentSection] = useState('home');
            const [time, setTime] = useState(new Date());
            const [isLocked, setIsLocked] = useState(true);

            useEffect(() => {
                const timer = setInterval(() => setTime(new Date()), 1000);
                return () => clearInterval(timer);
            }, []);

            const playSound = (freq) => {
                try {
                    const ctx = new (window.AudioContext || window.webkitAudioContext)();
                    const osc = ctx.createOscillator();
                    const gain = ctx.createGain();
                    osc.connect(gain);
                    gain.connect(ctx.destination);
                    osc.frequency.setValueAtTime(freq, ctx.currentTime);
                    gain.gain.setValueAtTime(0.1, ctx.currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + 0.2);
                    osc.start();
                    osc.stop(ctx.currentTime + 0.2);
                } catch(e) {}
            };

            if (stage === 'mirror') {
                return (
                    <div className="h-screen flex flex-col items-center justify-center cursor-pointer" onClick={() => { setStage('identify'); playSound(440); }}>
                        <div className="text-center space-y-4">
                            <h1 className="orbitron text-8xl md:text-9xl font-black opacity-80">{time.toLocaleTimeString('en-US', {hour12:false, hour:'2-digit', minute:'2-digit'})}</h1>
                            <p className="text-pink-500 tracking-[1.5em] text-xs font-bold uppercase mr-[-1.5em]">System Standby</p>
                            <div className="mt-20 p-6 border border-white/10 rounded-full animate-bounce inline-block">
                                <div className="w-4 h-4 bg-pink-500 rounded-full shadow-[0_0_15px_#ff007f]"></div>
                            </div>
                        </div>
                    </div>
                );
            }

            if (stage === 'identify') {
                return (
                    <div className="h-screen flex items-center justify-center p-6">
                        <div className="w-full max-w-md p-10 glass rounded-[3rem] relative overflow-hidden">
                            <div className="scanner-line opacity-20"></div>
                            <div className="text-center space-y-8 relative z-10">
                                <div className="w-20 h-20 mx-auto bg-gradient-to-tr from-pink-500 to-purple-500 rounded-3xl flex items-center justify-center text-3xl">👤</div>
                                <h2 className="text-3xl font-black">التعرف على الهوية</h2>
                                <input 
                                    type="text" 
                                    placeholder="اكتب اسمك هنا..." 
                                    className="w-full bg-white/5 border border-white/10 rounded-2xl py-5 px-6 text-center text-xl outline-none focus:border-pink-500 transition-all text-white"
                                    onChange={(e) => setUserName(e.target.value)}
                                />
                                <button 
                                    className="w-full py-5 bg-white text-black font-black rounded-2xl hover:scale-105 active:scale-95 transition-all"
                                    onClick={() => { if(userName) { setStage('dashboard'); playSound(880); }}}
                                >بدء التشغيل</button>
                            </div>
                        </div>
                    </div>
                );
            }

            return (
                <div className="h-screen flex flex-col p-4 md:p-6 gap-6">
                    <header className="flex items-center justify-between glass p-6 rounded-[2.5rem]">
                        <div className="flex items-center gap-4">
                            <div className="w-12 h-12 bg-pink-500 rounded-2xl flex items-center justify-center text-2xl shadow-lg shadow-pink-500/40">⚡</div>
                            <div>
                                <h3 className="font-black text-lg">بيت {userName} الذكي</h3>
                                <p className="text-[10px] text-white/40 uppercase tracking-widest">Active Security Protocol</p>
                            </div>
                        </div>
                        <div className="text-right orbitron">
                            <div className="text-2xl font-black">{time.toLocaleTimeString('en-US', {hour12:false})}</div>
                            <div className="text-[10px] text-pink-500 font-bold uppercase">Real-time</div>
                        </div>
                    </header>

                    <div className="flex-1 flex gap-6 overflow-hidden">
                        <aside className="w-24 glass rounded-[3rem] flex flex-col items-center py-8 gap-6 no-scrollbar overflow-y-auto">
                            {[
                                {id:'home', icon: Icons.Home}, {id:'kitchen', icon: Icons.Kitchen}, 
                                {id:'bedroom', icon: Icons.Bed}, {id:'farm', icon: Icons.Farm}, 
                                {id:'garage', icon: Icons.Garage}, {id:'door', icon: Icons.Door}
                            ].map(item => (
                                <button 
                                    key={item.id}
                                    onClick={() => { setCurrentSection(item.id); playSound(600); }}
                                    className={`w-14 h-14 rounded-2xl flex items-center justify-center text-2xl transition-all ${currentSection === item.id ? 'bg-pink-500 shadow-lg shadow-pink-500/50' : 'bg-white/5 opacity-40 hover:opacity-100'}`}
                                >{item.icon}</button>
                            ))}
                        </aside>

                        <main className="flex-1 overflow-y-auto no-scrollbar pb-10">
                            <h2 className="text-4xl font-black mb-8 px-2 uppercase tracking-tight">
                                {currentSection === 'home' ? 'نظرة عامة' : currentSection}
                            </h2>
                            <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                                <div className="glass p-8 rounded-[3rem]">
                                    <h4 className="text-xl font-bold mb-4">الحالة المباشرة</h4>
                                    <div className="space-y-4">
                                        <div className="flex justify-between p-4 bg-white/5 rounded-2xl">
                                            <span>درجة الحرارة</span>
                                            <span className="text-orange-400">24°C</span>
                                        </div>
                                        <div className="flex justify-between p-4 bg-white/5 rounded-2xl">
                                            <span>استهلاك الطاقة</span>
                                            <span className="text-yellow-400">2.4 Kw/h</span>
                                        </div>
                                    </div>
                                </div>
                                <div className="glass p-8 rounded-[3rem] flex flex-col items-center justify-center space-y-4">
                                    <div className={`text-6xl ${isLocked ? 'opacity-40' : 'animate-pulse'}`}>
                                        {isLocked ? Icons.Shield : Icons.Eye}
                                    </div>
                                    <button 
                                        onClick={() => { setIsLocked(!isLocked); playSound(300); }}
                                        className={`px-8 py-4 rounded-2xl font-bold transition-all ${isLocked ? 'bg-red-500/20 text-red-500 border border-red-500/30' : 'bg-green-500 text-white'}`}
                                    >
                                        {isLocked ? 'فتح تأمين النظام' : 'النظام مفتوح'}
                                    </button>
                                </div>
                            </div>
                        </main>
                    </div>

                    <footer className="grid grid-cols-2 md:grid-cols-4 gap-4">
                        <div className="glass p-4 rounded-3xl flex items-center gap-4 text-xs font-bold">
                            <span className="text-pink-500">SYSTEM:</span> OPTIMAL
                        </div>
                        <div className="glass p-4 rounded-3xl flex items-center gap-4 text-xs font-bold">
                            <span className="text-blue-500">WATER:</span> 450L
                        </div>
                        <div className="glass p-4 rounded-3xl flex items-center gap-4 text-xs font-bold">
                            <span className="text-green-500">AIR:</span> 98%
                        </div>
                        <div className="glass p-4 rounded-3xl flex items-center gap-4 text-xs font-bold">
                            <span className="text-purple-500">STORAGE:</span> 1.2TB
                        </div>
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
